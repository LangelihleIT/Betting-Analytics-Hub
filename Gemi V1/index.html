<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Betting Analytics Hub</title>
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #3b82f6;
        --success: #22c55e;
        --danger: #ef4444;
        --warning: #f59e0b;
        --draw: #94a3b8;
        --border: #334155;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        padding: 20px;
        line-height: 1.6;
      }

      .container {
        max-width: 1300px;
        margin: 0 auto;
      }

      .container h1{
        text-align: center;
      }

      h1,
      h2,
      h3 {
        color: var(--text-main);
        margin-bottom: 15px;
      }

      /* Dashboard Grid */
      .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        border: 1px solid var(--border);
        text-align: center;
      }

      .stat-card span {
        display: block;
        color: var(--text-muted);
        font-size: 0.9em;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
      }

      .stat-card strong {
        font-size: 1.5em;
      }

      .text-green { color: var(--success); }
      .text-red { color: var(--danger); }
      .text-draw { color: var(--draw); }

      /* Main Layout */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
      }

      @media (max-width: 900px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      /* Form */
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: var(--text-muted);
        font-size: 0.9em;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        background: var(--bg-color);
        border: 1px solid var(--border);
        color: var(--text-main);
        border-radius: 4px;
      }

      button {
        width: 100%;
        padding: 12px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.2s;
        margin-top: 10px;
      }

      button.update-btn {
        background: var(--warning);
        color: #000;
      }

      button:hover {
        opacity: 0.7;
      }

      /* Table */
      .table-container {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }
      th,td {
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }
      td.font-bold {
        font-weight: bold;
        }
      th {
        color: var(--text-muted);
        font-weight: normal;
        font-size: 0.9em;
      }

      .badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.8em;
        font-weight: bold;
        cursor: pointer;
        display: inline-block;
        min-width: 85px;
        text-align: center;
        user-select: none;
      }
      .badge.win {
        background: rgba(34, 197, 94, 0.2);
        color: var(--success);
      }
      .badge.loss {
        background: rgba(239, 68, 68, 0.2);
        color: var(--danger);
      }
      .badge.draw {
        background: rgba(148, 163, 184, 0.2);
        color: var(--draw);
      }
      .badge.pending {
        background: rgba(245, 158, 11, 0.2);
        color: var(--warning);
      }

      .action-btns {
        display: flex;
        gap: 5px;
      }
      .icon-btn {
        background: transparent;
        padding: 5px;
        width: auto;
        font-size: 1.1em;
        margin: 0;
      }
      .delete-btn { color: var(--danger); }
      .edit-btn { color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📈 Betting Analytics Hub</h1>

      <div class="dashboard" id="dashboard">
        <div class="stat-card">
          <span>Net Profit/Loss</span><strong id="stat-pl">R0.00</strong>
        </div>
        <div class="stat-card">
          <span>Today's Stake</span><strong id="stat-today-stake">R0.00</strong>
        </div>
        <div class="stat-card">
          <span>Today's P/L</span><strong id="stat-today-pl">R0.00</strong>
        </div>
        <div class="stat-card">
          <span>ROI</span><strong id="stat-roi">0%</strong>
        </div>
        <div class="stat-card">
          <span>Win Rate</span><strong id="stat-winrate">0%</strong>
        </div>
        <div class="stat-card">
          <span>Losing Streak</span><strong id="stat-streak">0</strong>
        </div>

        <div class="stat-card">
          <span>Total Money Staked</span><strong id="stat-total-staked">R0.00</strong>
        </div>
      </div>

      <div class="main-grid">
        <div class="panel">
          <h2 id="formTitle">📝 Log New Bet</h2>
          <form id="betForm">
            
            <div id="singleBetSection">
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
                <div class="form-group">
                  <label>Team A (Home)</label>
                  <input type="text" id="teamA" list="teamList" placeholder="e.g. Arsenal" required />
                </div>
                <div class="form-group">
                  <label>Team B (Away)</label>
                  <input type="text" id="teamB" list="teamList" placeholder="e.g. Chelsea" required />
                </div>
              </div>
              <datalist id="teamList"></datalist>

          <div class="form-group">
            <label>Your Pick (Who you want to win)</label>
            <select id="prediction" required>
              <option value="">-- Select Pick --</option>
              <option id="optTeamA" value="Team A">Team A</option>
              <option id="optTeamB" value="Team B">Team B</option>
              <option value="Draw">Draw</option>
              <option value="Other">Other / BTTS / Over-Under</option>
            </select>
          </div>

          <div class="form-group">
            <label>Actual Outcome (Team That Won)</label>
            <select id="outcome" required>
              <option value="">-- Pick Outcome --</option>
              <option id="TeamA" value="Team A">Team A</option>
              <option id="TeamB" value="Team B">Team B</option>
              <option value="Draw">Draw</option>
            </select>
          </div>
        </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
              <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" required />
              </div>
              <div class="form-group">
                <label>Time</label>
                <input type="time" id="time" required />
              </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
              <div class="form-group">
                <label>Odds (Decimal)</label>
                <input type="number" id="odds" step="0.01" min="1.01" placeholder="2.10" required />
              </div>
              <div class="form-group">
                <label>Stake (R)</label>
                <input type="number" id="stake" step="0.01" min="0.1" placeholder="R50" required />
              </div>
            </div>

            <div class="form-group">
              <label>Bet Type</label>
              <select id="betType" required>
                <option value="1x2">1x2</option>
                <option value="BTTS(GG/NG)">BTTS(GG/NG)</option>
                <option value="Draw/No Bet">Draw/No Bet</option>
                <option value="Parlay">Parlay</option>
              </select>
            </div>

            <div id="parlaySection" style="display:none; margin-top:15px;">
              <div class="form-group">
                <label>Number of Legs</label>
                <select id="legCount">
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                </select>
              </div>

              <div id="legsContainer"></div>
            </div>

            <div class="form-group">
              <label>Expected Return</label>
              <input type="text" id="expectedReturn" readonly placeholder="R" style="background: var(--bg-color)" />
            </div>
            
            <button type="submit" id="submitBtn">Log Bet</button>
            <button type="button" id="cancelEditBtn" style="display:none; background: var(--border);">Cancel Edit</button>
          </form>
        </div>

        <div class="panel">
          <h2>🗂️ Audit Trail</h2>
          <input class="search" id="search" placeholder="Search..." onkeyup="renderAll()">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Matchup</th>
                  <th>Your Pick</th>
                  <th>Actual outcome</th>
                  <th>Type/Odds</th>
                  <th>Stake</th>
                  <th>Outcome</th>
                  <th>Profit</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="historyTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      let bets = JSON.parse(localStorage.getItem("betting_data")) || [];
      let editingId = null;

      // ---------------------
      // SHARED TEAM DATASET
      // ---------------------
      const teams = [
        //Preimer League
        "Arsenal","Aston Villa","Bournemouth","Brentford",
        "Brighton & Hove Albion","Burnley","Chelsea","Crystal Palace",
        "Everton","Fulham","Leeds United","Liverpool","Manchester City", 
        "Manchester United","Newcastle United","Nottingham Forest","Sunderland",
        "Tottenham Hotspur","West Ham United","Wolverhampton Wanderers",
        //La Liga
        "Athletic Bilbao","Atlético Madrid","Barcelona","Celta Vigo",
        "Deportivo Alavés","Elche","Espanyol","Getafe","Girona","Levante",
        "Mallorca","Osasuna","Rayo Vallecano","Real Betis","Real Madrid",
        "Real Oviedo","Real Sociedad","Sevilla","Valencia","Villarreal", 
        //Seria A
        "AC Milan","Atalanta","Bologna","Cagliari","Como 1907","Cremonese",
        "Fiorentina","Genoa","Hellas Verona","Inter Milan","Juventus","Lazio",
        "Lecce","Napoli","Parma","Pisa","Roma","Sassuolo","Torino","Udinese",
        //Bundesliga
        "Bayer Leverkusen","Bayern Munich","Borussia Dortmund",
        "Borussia Mönchengladbach","Eintracht Frankfurt","FC Augsburg","FC Köln",
        "FC St. Pauli","Hamburger SV","1. FC Heidenheim" ,"1. FC Union Berlin",
        "1. FSV Mainz 05","RB Leipzig" ,"SC Freiburg", "TSG Hoffenheim","VfB Stuttgart",
        "VfL Wolfsburg","Werder Bremen",
        //Ligue 1
        "AJ Auxerre","Angers","AS Monaco","FC Lorient","FC Metz","FC Nantes",
        "Le Havre","Lens","Lille","Olympique Lyon","Olympique Marseille","Nice" ,"Paris FC",
        "Paris Saint-Germain" ,"Reims","Rennes","Strasbourg","Toulouse" 
      ];

      // Populate datalist
      const teamList = document.getElementById("teamList");

      function populateTeamList() {
        teamList.innerHTML = "";
        teams.forEach(team => {
          const option = document.createElement("option");
          option.value = team;
          teamList.appendChild(option);
        });
      }

      populateTeamList();

      // DOM
      const form = document.getElementById("betForm");
      const tableBody = document.getElementById("historyTable");
      const oddsInput = document.getElementById("odds");
      const stakeInput = document.getElementById("stake");
      const expectedReturnInput = document.getElementById("expectedReturn");
      const teamAInput = document.getElementById("teamA");
      const teamBInput = document.getElementById("teamB");
      const optTeamA = document.getElementById("optTeamA");
      const optTeamB = document.getElementById("optTeamB");
      const TeamA = document.getElementById("TeamA");
      const TeamB = document.getElementById("TeamB");
      const submitBtn = document.getElementById("submitBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");
      const betTypeSelect = document.getElementById("betType");
      const parlaySection = document.getElementById("parlaySection");
      const legCountSelect = document.getElementById("legCount");
      const legsContainer = document.getElementById("legsContainer");

      // Function to update the main form dropdown text/values
      function updateMainDropdowns() {
        const teamAVal = teamAInput.value || "Team A";
        const teamBVal = teamBInput.value || "Team B";

        // Update Prediction Dropdown
        optTeamA.textContent = teamAVal;
        optTeamA.value = teamAVal;
        optTeamB.textContent = teamBVal;
        optTeamB.value = teamBVal;

        // Update Outcome Dropdown
        TeamA.textContent = teamAVal;
        TeamA.value = teamAVal;
        TeamB.textContent = teamBVal;
        TeamB.value = teamBVal;
      }

      // Listen for typing in the Team A and Team B boxes
      teamAInput.addEventListener("input", updateMainDropdowns);
      teamBInput.addEventListener("input", updateMainDropdowns);

      // ---------------------
      // EXPECTED RETURN
      // ---------------------
      function calculateExpected() {
        const odds = parseFloat(oddsInput.value) || 0;
        const stake = parseFloat(stakeInput.value) || 0;
        expectedReturnInput.value = "R" + (odds * stake).toFixed(2);
      }
      oddsInput.addEventListener("input", calculateExpected);
      stakeInput.addEventListener("input", calculateExpected);

      // ---------------------
      // PARLAY TOGGLE
      // ---------------------
     const singleBetSection = document.getElementById("singleBetSection");
      const predictionInput = document.getElementById("prediction");
      const outcomeInput = document.getElementById("outcome");

betTypeSelect.addEventListener("change", function () {
  if (this.value === "Parlay") {
    // Show parlay stuff, hide single bet stuff
    parlaySection.style.display = "block";
    singleBetSection.style.display = "none";
    
    // Remove required attributes so form can submit
    teamAInput.removeAttribute("required");
    teamBInput.removeAttribute("required");
    predictionInput.removeAttribute("required");
    outcomeInput.removeAttribute("required");
    
    // Make odds readonly (auto-calculated)
    oddsInput.setAttribute("readonly", true);
    oddsInput.style.background = "var(--bg-color)"; 
    
    generateLegInputs();
  } else {
    // Hide parlay stuff, show single bet stuff
    parlaySection.style.display = "none";
    singleBetSection.style.display = "block";
    legsContainer.innerHTML = "";
    
    // Add required attributes back
    teamAInput.setAttribute("required", "true");
    teamBInput.setAttribute("required", "true");
    predictionInput.setAttribute("required", "true");
    outcomeInput.setAttribute("required", "true");
    
    // Make odds editable again
    oddsInput.removeAttribute("readonly");
    oddsInput.style.background = "var(--bg-color)";
  }
});

      legCountSelect.addEventListener("change", generateLegInputs);

      function generateLegInputs() {
        const count = parseInt(legCountSelect.value);
        legsContainer.innerHTML = "";

        for (let i = 1; i <= count; i++) {
          const legDiv = document.createElement("div");
          legDiv.style.marginBottom = "15px";
          legDiv.style.padding = "10px";
          legDiv.style.border = "1px dashed var(--border)";
          legDiv.style.borderRadius = "4px";

          legDiv.innerHTML = `
            <label style="margin-bottom: 5px; display:block; color:var(--accent);">Leg ${i}</label>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
              <input type="text" placeholder="Team A (Home)" class="leg-teamA" list="teamList" required />
              <input type="text" placeholder="Team B (Away)" class="leg-teamB" list="teamList" required />
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;">
              <select class="leg-bet-type" required>
                <option value="">-- Bet Type --</option>
                <option value="1x2">1x2</option>
                <option value="BTTS(GG/NG)">BTTS(GG/NG)</option>
                <option value="Draw/No Bet">Draw/No Bet</option>
              </select>

              <input type="number" placeholder="Odds" step="0.01" min="1.01" class="leg-odds" required />
              
              <select class="leg-prediction" required>
                <option value="">-- Pick --</option>
                <option class="leg-opt-teamA" value="Team A">Team A</option>
                <option class="leg-opt-teamB" value="Team B">Team B</option>
                <option value="Draw">Draw</option>
              </select>
              
              <select class="leg-outcome" required>
                <option value="">-- Outcome --</option>
                <option class="leg-out-teamA" value="Team A">Team A</option>
                <option class="leg-out-teamB" value="Team B">Team B</option>
                <option value="Draw">Draw</option>
              </select>
            </div>
          `;
          legsContainer.appendChild(legDiv);
        }

        attachLegListeners();
      }

      function attachLegListeners() {
        // Listen for odds calculations
        const legOddsInputs = document.querySelectorAll(".leg-odds");
        legOddsInputs.forEach(input => {
          input.addEventListener("input", calculateParlayOdds);
        });

        // Attach dynamic dropdown listeners for EACH leg individually
        const legs = legsContainer.children;
        Array.from(legs).forEach(leg => {
          const teamA = leg.querySelector(".leg-teamA");
          const teamB = leg.querySelector(".leg-teamB");
          const predA = leg.querySelector(".leg-opt-teamA");
          const predB = leg.querySelector(".leg-opt-teamB");
          const outA = leg.querySelector(".leg-out-teamA");
          const outB = leg.querySelector(".leg-out-teamB");

          const updateLegDropdowns = () => {
            const valA = teamA.value || "Team A";
            const valB = teamB.value || "Team B";
            
            predA.textContent = valA; predA.value = valA;
            outA.textContent = valA; outA.value = valA;
            
            predB.textContent = valB; predB.value = valB;
            outB.textContent = valB; outB.value = valB;
          };

          teamA.addEventListener("input", updateLegDropdowns);
          teamB.addEventListener("input", updateLegDropdowns);
        });
      }

      // ---------------------
      // EDIT & DELETE ACTIONS
      // ---------------------
      function deleteBet(id) {
        if (confirm("Are you sure you want to delete this bet?")) {
          bets = bets.filter(b => b.id !== id);
          saveData();
          renderTable();
          updateDashboard();
        }
      }

      function editBet(id) {
        const bet = bets.find(b => b.id === id);
        if (!bet) return;
        
        editingId = id;
        
        // Populate standard form inputs
        teamAInput.value = bet.teamA || "";
        teamBInput.value = bet.teamB || "";
        document.getElementById("date").value = bet.date;
        document.getElementById("time").value = bet.time;
        oddsInput.value = bet.odds;
        stakeInput.value = bet.stake;
        betTypeSelect.value = bet.betType;
        
        // Refresh dynamic dropdowns based on inputs
        if (typeof updateMainDropdowns === "function") updateMainDropdowns();
        
        document.getElementById("prediction").value = bet.prediction;
        document.getElementById("outcome").value = bet.outcome;
        
        // Handle Parlay UI 
        if (bet.betType === "Parlay") {
           parlaySection.style.display = "block";
           legCountSelect.value = bet.legs ? bet.legs.length : 2;
           generateLegInputs(); 
           // Note: You would loop through bet.legs here to populate the generated boxes if needed.
        } else {
           parlaySection.style.display = "none";
        }
        
        calculateExpected();
        
        // Update form visually to show edit mode
        submitBtn.textContent = "Update Bet";
        submitBtn.classList.add("update-btn");
        cancelEditBtn.style.display = "inline-block";
        document.getElementById("formTitle").textContent = "✏️ Edit Bet";
        
        // Scroll to top to see the form
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function resetEditState() {
        editingId = null;
        submitBtn.textContent = "Log Bet";
        submitBtn.classList.remove("update-btn");
        cancelEditBtn.style.display = "none";
        document.getElementById("formTitle").textContent = "📝 Log New Bet";
      }

      cancelEditBtn.addEventListener("click", () => {
        form.reset();
        resetEditState();
        parlaySection.style.display = "none";
        expectedReturnInput.value = "";
        document.getElementById("date").valueAsDate = new Date();
      });

      function calculateParlayOdds() {
        const legOddsInputs = document.querySelectorAll(".leg-odds");
        let combinedOdds = 1;

        legOddsInputs.forEach(input => {
          const value = parseFloat(input.value);
          if (!isNaN(value)) {
            combinedOdds *= value;
          }
        });

        oddsInput.value = combinedOdds.toFixed(2);
        calculateExpected();
      }

      // ---------------------
      // SUBMIT
      // ---------------------
      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const odds = parseFloat(oddsInput.value);
        const stake = parseFloat(stakeInput.value);
        const expectedReturn = odds * stake;

        const betData = {
          teamA: teamAInput.value,
          teamB: teamBInput.value,
          prediction: document.getElementById("prediction").value,
          outcome: document.getElementById("outcome").value,
          date: document.getElementById("date").value,
          time: document.getElementById("time").value,
          odds,
          stake,
          betType: betTypeSelect.value,
          expectedReturn
        };

        let status = "Pending";
        let profit = 0;

        if (betData.betType === "Parlay") {
          const legTeamAs = document.querySelectorAll(".leg-teamA");
          const legTeamBs = document.querySelectorAll(".leg-teamB");
          const legBetTypes = document.querySelectorAll(".leg-bet-type");
          const legOdds = document.querySelectorAll(".leg-odds");
          const legPredictions = document.querySelectorAll(".leg-prediction");
          const legOutcomes = document.querySelectorAll(".leg-outcome");

          let allWon = true;
          const legs = [];

          for (let i = 0; i < legTeamAs.length; i++) {
            const leg = {
              match: `${legTeamAs[i].value} vs ${legTeamBs[i].value}`,
              betType: legBetTypes[i].value,
              odds: parseFloat(legOdds[i].value),
              prediction: legPredictions[i].value,
              outcome: legOutcomes[i].value
            };

            if (leg.prediction !== leg.outcome) {
              allWon = false;
            }

            legs.push(leg);
          }

          betData.legs = legs;

          status = allWon ? "Win" : "Loss";
          profit = allWon ? expectedReturn - stake : -stake;

        } else {
          if (betData.prediction === betData.outcome) {
            status = "Win";
            profit = expectedReturn - stake;
          } else {
            status = "Loss";
            profit = -stake;
          }
        }

        if (editingId) {
          const index = bets.findIndex(b => b.id === editingId);
          bets[index] = { ...bets[index], ...betData, status, profit };
          resetEditState();
        } else {
          bets.unshift({ id: Date.now().toString(), ...betData, status, profit });
        }

        saveData();
        renderTable();
        updateDashboard();
        form.reset();
        expectedReturnInput.value = "";
      });

      // ---------------------
      // STORAGE
      // ---------------------
      function saveData() {
        localStorage.setItem("betting_data", JSON.stringify(bets));
      }

      function renderAll() {
        const search = document.getElementById("search").value.toLowerCase();
        // Just leaving the original stub function body for your future search implementation
        bets.filter(b=> (b.teamA+" "+b.teamB).toLowerCase().includes(search));
      }

      // ---------------------
      // DASHBOARD & TABLE UI
      // ---------------------
      function updateDashboard() {
        let totalProfit = 0;
        let totalStake = 0;
        let totalMoneyStaked = 0;
        let wins = 0;
        let settledBets = 0;
        let todayStake = 0;
        let todayProfit = 0;
        let currentStreak = 0;
        let streakActive = true;
        document.getElementById("stat-total-staked").textContent =
        "R" + totalMoneyStaked.toFixed(2);

        // Get today's date in YYYY-MM-DD format to match the date input
        const todayStr = new Date().toISOString().split('T')[0];

        bets.forEach(bet => {
          // Calculate overall stats
          if (bet.status !== "Pending") {
            totalProfit += bet.profit;
            totalStake += bet.stake;
            settledBets++;
            totalMoneyStaked += bet.stake;
            
            if (bet.status === "Win") wins++;
            
            // Calculate Losing Streak (assuming array is newest first)
            if (streakActive) {
              if (bet.status === "Loss") {
                currentStreak++;
              } else {
                streakActive = false;
              }
            }
          }

          // Calculate today's stats
          if (bet.date === todayStr) {
            todayStake += bet.stake;
            if (bet.status !== "Pending") {
              todayProfit += bet.profit;
            }
          }
        });

        // Math for ROI and Win Rate
        const roi = totalStake > 0 ? (totalProfit / totalStake) * 100 : 0;
        const winRate = settledBets > 0 ? (wins / settledBets) * 100 : 0;

        // Update the DOM elements
        document.getElementById("stat-pl").textContent = "R" + totalProfit.toFixed(2);
        document.getElementById("stat-pl").className = totalProfit >= 0 ? "text-green" : "text-red";
        
        document.getElementById("stat-today-stake").textContent = "R" + todayStake.toFixed(2);
        
        document.getElementById("stat-today-pl").textContent = "R" + todayProfit.toFixed(2);
        document.getElementById("stat-today-pl").className = todayProfit >= 0 ? "text-green" : "text-red";
        
        document.getElementById("stat-roi").textContent = roi.toFixed(1) + "%";
        document.getElementById("stat-winrate").textContent = winRate.toFixed(1) + "%";
        document.getElementById("stat-streak").textContent = currentStreak;
      }

      function renderTable() {
        tableBody.innerHTML = "";
        
        bets.forEach(bet => {
          const tr = document.createElement("tr");
          
          // Format the matchup name based on bet type
          let matchup = bet.betType === "Parlay" 
            ? `<b>${bet.legs.length}-Leg Parlay</b>` 
            : `${bet.teamA} vs ${bet.teamB}`;
            
          // Format profit text and colors
          let profitText = "-";

          if (bet.status === "Win") {
            profitText = `+R${bet.profit.toFixed(2)}`;
          }

          if (bet.status === "Loss") {
            profitText = `Lost R${Math.abs(bet.profit).toFixed(2)}`;
          }
          let profitClass = bet.status === "Pending" ? "" : (bet.profit >= 0 ? "text-green" : "text-red");

          tr.innerHTML = `
            <td>${bet.date}<br><small style="color:var(--text-muted)">${bet.time}</small></td>
            <td>${matchup}</td>
            <td>${bet.prediction}</td>
            <td>${bet.outcome || "-"}</td>
            <td>${bet.betType}<br><small style="color:var(--text-muted)">@${bet.odds.toFixed(2)}</small></td>
            <td>R${bet.stake.toFixed(2)}</td>
            <td><span class="badge ${bet.status.toLowerCase()}">${bet.status}</span></td>
            <td class="font-bold ${profitClass}">${profitText}</td>
            <td class="action-btns">
              <button type="button" class="icon-btn edit-btn" onclick="editBet('${bet.id}')">✏️</button>
              <button type="button" class="icon-btn delete-btn" onclick="deleteBet('${bet.id}')">🗑️</button>
            </td>
          `;
          tableBody.appendChild(tr);
        });
        const tr = document.createElement("tr");
        tr.style.cursor = "pointer";
        tr.onclick = () => viewBet(bet.id);
      }

      // INIT
      document.getElementById("date").valueAsDate = new Date();
      renderTable();
      updateDashboard();

      function viewBet(id) {

      const bet = bets.find(b => b.id === id);
      if (!bet) return;

          let detailsHTML = `
          <strong>Match:</strong> ${bet.teamA || ""} vs ${bet.teamB || ""}<br>
          <strong>Date:</strong> ${bet.date} ${bet.time}<br>
          <strong>Bet Type:</strong> ${bet.betType}<br>
          <strong>Your Pick:</strong> ${bet.prediction}<br>
          <strong>Outcome:</strong> ${bet.outcome}<br>
          <strong>Odds:</strong> ${bet.odds}<br>
          <strong>Stake:</strong> R${bet.stake.toFixed(2)}<br>
          <strong>Expected Return:</strong> R${bet.expectedReturn.toFixed(2)}<br>
          <strong>Status:</strong> ${bet.status}<br>
          <strong>Profit/Loss:</strong> R${bet.profit.toFixed(2)}<br>
          `;

          if (bet.betType === "Parlay" && bet.legs) {

            detailsHTML += "<br><strong>Parlay Legs:</strong><br>";

            bet.legs.forEach((leg, index) => {
              detailsHTML += `
              Leg ${index + 1}: ${leg.match}<br>
              Pick: ${leg.prediction} | Outcome: ${leg.outcome} | Odds: ${leg.odds}<br><br>
              `;
            });
          }

          document.getElementById("betDetails").innerHTML = detailsHTML;
          document.getElementById("betModal").style.display = "flex";
        }

        function closeBetModal() {
          document.getElementById("betModal").style.display = "none";
        }
      </script>

        <div id="betModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
  
        <div style="background:#1e293b; padding:25px; border-radius:8px; max-width:500px; width:90%; border:1px solid #334155;">
        
        <h2>Bet Details</h2>
        
        <div id="betDetails" style="margin-top:15px; line-height:1.8;"></div>

        <button onclick="closeBetModal()" style="margin-top:20px;">Close</button>

      </div>

</div>
  </body>
</html>
