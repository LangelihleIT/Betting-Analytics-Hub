<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Betting Analytics System</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#22c55e;
  --danger:#ef4444;
  --warning:#f59e0b;
  --text:#f1f5f9;
}
body {
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:20px;
}
.container{max-width:1200px;margin:auto;}
.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}
input,select{
  padding:8px;
  margin:5px;
  border-radius:5px;
  border:none;
}
button{
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:var(--accent);
  color:#000;
  font-weight:bold;
}
button.danger{background:var(--danger);color:#fff;}
button.edit{background:#3b82f6;color:#fff;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}
.stat{
  background:#0a51ec;
  padding:10px;
  border-radius:8px;
  text-align:center;
}
table{width:100%;border-collapse:collapse;}
th,td{
  padding:8px;
  text-align:center;
  font-size:14px;
}
th{background:#111827;}
tr:nth-child(even){background:#0b1220;}
.profit{color:var(--accent);}
.loss{color:var(--danger);}
.search{width:100%;margin-bottom:10px;}
</style>
</head>

<body>
<div class="container">
<h1>📊 Betting Intelligence Dashboard</h1>

<div class="card">
<h3>➕ Log New Bet</h3>

<input list="teamsList" id="teamA" placeholder="Team A">
<input list="teamsList" id="teamB" placeholder="Team B">
<datalist id="teamsList"></datalist>

<br>

<select id="selectedTeam">
  <option value="">Team You Backed</option>
</select>

<select id="actualOutcome">
  <option value="">Actual Outcome</option>
  <option value="Win">✅ Win</option>
  <option value="Loss">❌ Loss</option>
  <option value="Draw">➖ Draw</option>
</select>

<br>

<input type="date" id="date">
<input type="time" id="time">
<input type="number" step="0.01" id="odds" placeholder="Odds">
<input type="number" step="0.01" id="stake" placeholder="Stake">

<button onclick="addOrUpdateBet()">Save Bet</button>
</div>

<div class="card">
<h3>📈 Dashboard</h3>
<div class="grid" id="stats"></div>
</div>

<div class="card">
<h3>🗂️ History</h3>
<input class="search" id="search" placeholder="Search..." onkeyup="renderAll()">
<table>
<thead>
<tr>
<th>Match</th>
<th>Backed</th>
<th>Outcome</th>
<th>Date</th>
<th>Stake</th>
<th>Profit</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<script>
let bets = JSON.parse(localStorage.getItem("bets")) || [];
let teams = JSON.parse(localStorage.getItem("teams")) || [];
let editingId = null;

const teamAInput = document.getElementById("teamA");
const teamBInput = document.getElementById("teamB");
const selectedTeamInput = document.getElementById("selectedTeam");
const actualOutcomeInput = document.getElementById("actualOutcome");
const dateInput = document.getElementById("date");
const timeInput = document.getElementById("time");
const oddsInput = document.getElementById("odds");
const stakeInput = document.getElementById("stake");

function saveAll(){
  localStorage.setItem("bets",JSON.stringify(bets));
  localStorage.setItem("teams",JSON.stringify(teams));
}

function updateTeamOptions(){
  const list = document.getElementById("teamsList");
  list.innerHTML="";
  teams.forEach(t=>{
    const option=document.createElement("option");
    option.value=t;
    list.appendChild(option);
  });
}

function updateBackedDropdown(){
  selectedTeamInput.innerHTML='<option value="">Team You Backed</option>';
  if(teamAInput.value) selectedTeamInput.innerHTML+=`<option value="${teamAInput.value}">${teamAInput.value}</option>`;
  if(teamBInput.value) selectedTeamInput.innerHTML+=`<option value="${teamBInput.value}">${teamBInput.value}</option>`;
}

teamAInput.oninput=updateBackedDropdown;
teamBInput.oninput=updateBackedDropdown;

function calculateProfit(bet){
  if(bet.actualOutcome==="Win") return bet.odds*bet.stake-bet.stake;
  if(bet.actualOutcome==="Loss") return -bet.stake;
  return 0;
}

function addOrUpdateBet(){
  const teamA=teamAInput.value.trim();
  const teamB=teamBInput.value.trim();
  const selectedTeam=selectedTeamInput.value;
  const actualOutcome=actualOutcomeInput.value;
  const date=dateInput.value;
  const time=timeInput.value;
  const odds=parseFloat(oddsInput.value);
  const stake=parseFloat(stakeInput.value);

  if(!teamA||!teamB||!selectedTeam||!actualOutcome||!date||!time||!odds||!stake){
    alert("Fill all fields");
    return;
  }

  if(!teams.includes(teamA)) teams.push(teamA);
  if(!teams.includes(teamB)) teams.push(teamB);

  const bet={
    id: editingId || Date.now(),
    teamA,teamB,selectedTeam,
    actualOutcome,date,time,odds,stake
  };
  bet.profit=calculateProfit(bet);

  if(editingId){
    bets=bets.map(b=>b.id===editingId?bet:b);
    editingId=null;
  }else{
    bets.push(bet);
  }

  saveAll();
  clearInputs();
  renderAll();
}

function clearInputs(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  selectedTeamInput.innerHTML='<option value="">Team You Backed</option>';
  actualOutcomeInput.value="";
}

function deleteBet(id){
  bets=bets.filter(b=>b.id!==id);
  saveAll();
  renderAll();
}

function editBet(id){
  const b=bets.find(b=>b.id===id);
  teamAInput.value=b.teamA;
  teamBInput.value=b.teamB;
  updateBackedDropdown();
  selectedTeamInput.value=b.selectedTeam;
  actualOutcomeInput.value=b.actualOutcome;
  dateInput.value=b.date;
  timeInput.value=b.time;
  oddsInput.value=b.odds;
  stakeInput.value=b.stake;
  editingId=id;
}

function calculateStats(){
  let totalStake=0,totalProfit=0;
  let losingStreak=0,maxLosingStreak=0;
  let currentStreak=0;

  const today=new Date().toISOString().split("T")[0];
  let todayStake=0,todayProfit=0;

  bets.sort((a,b)=>new Date(a.date+" "+a.time)-new Date(b.date+" "+b.time));

  bets.forEach(b=>{
    totalStake+=b.stake;
    totalProfit+=b.profit;

    if(b.profit<0){
      currentStreak++;
      maxLosingStreak=Math.max(maxLosingStreak,currentStreak);
    }else{
      currentStreak=0;
    }

    if(b.date===today){
      todayStake+=b.stake;
      todayProfit+=b.profit;
    }
  });

  return{
    totalStake,totalProfit,
    currentStreak,maxLosingStreak,
    todayStake,todayProfit
  };
}

function renderStats(){
  const s=calculateStats();
  document.getElementById("stats").innerHTML=`
    <div class="stat">💰 Net Profit: R${s.totalProfit.toFixed(2)}</div>
    <div class="stat">💵 Total Staked: R${s.totalStake.toFixed(2)}</div>
    <div class="stat">📉 Current Losing Streak: ${s.currentStreak}</div>
    <div class="stat">❌ Max Losing Streak: ${s.maxLosingStreak}</div>
    <div class="stat">📅 Today Stake: R${s.todayStake.toFixed(2)}</div>
    <div class="stat">📅 Today Net: R${s.todayProfit.toFixed(2)}</div>
  `;
}

function renderTable(){
  const search=document.getElementById("search").value.toLowerCase();
  const tbody=document.getElementById("tableBody");
  tbody.innerHTML="";

  bets.filter(b=>
    (b.teamA+" "+b.teamB+" "+b.selectedTeam)
    .toLowerCase().includes(search)
  ).forEach(b=>{
    const row=document.createElement("tr");
    row.innerHTML=`
      <td>${b.teamA} vs ${b.teamB}</td>
      <td>${b.selectedTeam}</td>
      <td>${b.actualOutcome==="Win"?"✅":b.actualOutcome==="Loss"?"❌":"➖"}</td>
      <td>${b.date}</td>
      <td>R${b.stake}</td>
      <td class="${b.profit>=0?"profit":"loss"}">R${b.profit.toFixed(2)}</td>
      <td>
        <button class="edit" onclick="editBet(${b.id})">Edit</button>
        <button class="danger" onclick="deleteBet(${b.id})">X</button>
      </td>
    `;
    tbody.appendChild(row);
  });
}

function renderAll(){
  updateTeamOptions();
  renderStats();
  renderTable();
}

renderAll();
</script>
</body>
</html>
