<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EDGE — Betting Analytics</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;600;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0a0b0d;
        --surface: #111318;
        --surface2: #181c24;
        --border: #242830;
        --text: #e8eaf0;
        --muted: #5a6072;
        --muted2: #8891a8;
        --accent: #f0c040;
        --accent2: #e8a020;
        --green: #2ecc71;
        --red: #e74c3c;
        --blue: #4a9eff;
        --orange: #ff6b35;
        --font-mono: "Space Mono", monospace;
        --font-display: "Barlow Condensed", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 13px;
        min-height: 100vh;
      }

      /* HEADER */
      .header {
        background: var(--surface);
        border-bottom: 2px solid var(--accent);
        padding: 0 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 56px;
      }

      .logo {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 26px;
        letter-spacing: 6px;
        color: var(--accent);
      }

      .header-meta {
        font-size: 11px;
        color: var(--muted);
      }

      /* NAV */
      .nav {
        background: var(--surface);
        display: flex;
        border-bottom: 1px solid var(--border);
      }

      .nav button {
        flex: 1;
        padding: 12px;
        background: none;
        border: none;
        font-family: var(--font-display);
        letter-spacing: 2px;
        font-weight: 700;
        cursor: pointer;
        color: var(--muted);
      }

      .nav button.active {
        color: var(--accent);
        border-bottom: 3px solid var(--accent);
      }

      /* MAIN */
      .main {
        padding: 24px;
        max-width: 1200px;
        margin: auto;
      }

      .section {
        background: var(--surface);
        border: 1px solid var(--border);
        margin-bottom: 20px;
      }

      .section-head {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-family: var(--font-display);
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--accent);
      }

      .section-body {
        padding: 16px;
      }

      /* TABLE */
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      th {
        color: var(--muted);
        text-transform: uppercase;
        font-size: 10px;
      }
      .status-win {
        color: var(--green);
      }
      .status-loss {
        color: var(--red);
      }
      .status-pending {
        color: var(--accent);
      }

      button.small {
        padding: 4px 8px;
        font-size: 10px;
        cursor: pointer;
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
      }

      button.small:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      input,
      select {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 6px;
        font-size: 12px;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        outline: none;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }

      .kpi {
        background: var(--surface2);
        padding: 14px;
        border: 1px solid var(--border);
        margin-bottom: 12px;
      }

      .kpi h3 {
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .kpi .value {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 28px;
      }

      .view {
        display: none;
      }
      .view.active {
        display: block;
      }
    </style>
  </head>

  <body>
    <header class="header">
      <div class="logo">EDGE</div>
      <div class="header-meta">
        <div id="today"></div>
        <div><strong id="betCount">0</strong> bets</div>
      </div>
    </header>

    <nav class="nav">
      <button data-view="dashboard" class="active">Dashboard</button>
      <button data-view="log">Log</button>
      <button data-view="history">History</button>
    </nav>

    <div class="main">
      <div id="dashboard" class="view active">
        <div id="kpis"></div>
      </div>

      <div id="log" class="view">
        <div class="section">
          <div class="section-head">Log Bet</div>
          <div class="section-body">
            <div class="form-grid">
              <input id="teamA" placeholder="Team A" />
              <input id="teamB" placeholder="Team B" />
              <input type="date" id="date" />
              <input type="time" id="time" />
              <input type="number" id="odds" step="0.01" placeholder="Odds" />
              <input type="number" id="stake" step="0.01" placeholder="Stake" />
              <select id="status">
                <option>Pending</option>
                <option>Win</option>
                <option>Loss</option>
              </select>
            </div>
            <br />
            <button id="saveBtn">SAVE</button>
          </div>
        </div>
      </div>

      <div id="history" class="view">
        <div class="section">
          <div class="section-head">History</div>
          <div class="section-body">
            <div id="tableWrap"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const EDGE = (() => {
        let bets = JSON.parse(localStorage.getItem("edge_bets") || "[]");

        function save() {
          localStorage.setItem("edge_bets", JSON.stringify(bets));
        }

        function uid() {
          return (
            crypto?.randomUUID?.() ||
            Date.now().toString(36) + Math.random().toString(36).slice(2)
          );
        }

        function toDateTime(b) {
          return new Date(`${b.date}T${b.time || "00:00"}`);
        }

        function calcProfit(b) {
          if (b.status === "Win") return b.odds * b.stake - b.stake;
          if (b.status === "Loss") return -b.stake;
          return 0;
        }

        function stats() {
          const settled = bets.filter((b) => b.status !== "Pending");
          const stake = settled.reduce((s, b) => s + b.stake, 0);
          const profit = settled.reduce((s, b) => s + calcProfit(b), 0);
          const roi = stake ? (profit / stake) * 100 : 0;
          return { settled, stake, profit, roi };
        }

        function renderDashboard() {
          const s = stats();
          document.getElementById("kpis").innerHTML = `
    <div class="kpi">
      <h3>Total P&L</h3>
      <div class="value" style="color:${s.profit >= 0 ? "var(--green)" : "var(--red)"}">
        ${s.profit.toFixed(2)}
      </div>
    </div>
    <div class="kpi">
      <h3>ROI</h3>
      <div class="value">${s.roi.toFixed(1)}%</div>
    </div>
  `;
        }

        function renderHistory() {
          if (!bets.length) {
            document.getElementById("tableWrap").innerHTML = "No bets yet.";
            return;
          }

          const rows = bets
            .sort((a, b) => toDateTime(b) - toDateTime(a))
            .map(
              (b) => `
    <tr>
      <td>${b.teamA} vs ${b.teamB || ""}</td>
      <td>${b.date}</td>
      <td>${b.odds}</td>
      <td>${b.stake}</td>
      <td class="status-${b.status.toLowerCase()}">${b.status}</td>
      <td>${calcProfit(b).toFixed(2)}</td>
    </tr>
  `,
            )
            .join("");

          document.getElementById("tableWrap").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Match</th><th>Date</th><th>Odds</th><th>Stake</th><th>Status</th><th>Profit</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
        }

        function updateHeader() {
          document.getElementById("today").textContent =
            new Date().toLocaleDateString("en-GB", {
              weekday: "short",
              day: "numeric",
              month: "short",
              year: "numeric",
            });
          document.getElementById("betCount").textContent = bets.length;
        }

        function saveBet() {
          const teamA = teamAInput.value.trim();
          const odds = parseFloat(oddsInput.value);
          const stake = parseFloat(stakeInput.value);
          if (!teamA || !odds || !stake) {
            alert("Fill required");
            return;
          }
          bets.unshift({
            id: uid(),
            teamA,
            teamB: teamBInput.value.trim(),
            date: dateInput.value,
            time: timeInput.value,
            odds,
            stake,
            status: statusInput.value,
          });
          save();
          updateHeader();
          renderDashboard();
          renderHistory();
        }

        const teamAInput = document.getElementById("teamA");
        const teamBInput = document.getElementById("teamB");
        const dateInput = document.getElementById("date");
        const timeInput = document.getElementById("time");
        const oddsInput = document.getElementById("odds");
        const stakeInput = document.getElementById("stake");
        const statusInput = document.getElementById("status");

        document.getElementById("saveBtn").addEventListener("click", saveBet);

        document.querySelectorAll(".nav button").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".nav button")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            document
              .querySelectorAll(".view")
              .forEach((v) => v.classList.remove("active"));
            document.getElementById(btn.dataset.view).classList.add("active");
          });
        });

        function init() {
          updateHeader();
          renderDashboard();
          renderHistory();
          dateInput.value = new Date().toISOString().split("T")[0];
          timeInput.value = new Date().toTimeString().slice(0, 5);
        }

        return { init };
      })();

      document.addEventListener("DOMContentLoaded", EDGE.init);
    </script>
  </body>
</html>
